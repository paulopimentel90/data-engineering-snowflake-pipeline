name: Data Pipeline (CI + CD)

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Puxar o código
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3️⃣ Instalar dependências
      - name: Install dependencies
        run: |
          pip install dbt-snowflake

      # 4️⃣ Configurar profile do dbt
      - name: Setup dbt profile
        run: |
          mkdir -p ~/.dbt
          printf "%s" "${{ secrets.DBT_PROFILES }}" > ~/.dbt/profiles.yml

      # 5️⃣ Instalar dependências do dbt
      - name: Run dbt deps
        run: dbt deps
        working-directory: dbt/snowflake_pipeline

      # 🔥 CI: validação do projeto
      - name: Run dbt debug
        run: dbt debug
        working-directory: dbt/snowflake_pipeline

      - name: Run dbt tests
        run: dbt test
        working-directory: dbt/snowflake_pipeline

      # 🚀 CD: deploy
      - name: Deploy to DEV
        run: dbt run --target dev
        working-directory: dbt/snowflake_pipeline
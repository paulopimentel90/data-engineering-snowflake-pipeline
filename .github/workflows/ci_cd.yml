name: Data Pipeline (CI + CD)

on:
  push:
    branches:
      - main

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install dbt-snowflake

      - name: Setup dbt profile
        run: |
          mkdir -p ~/.dbt
          echo "${{ secrets.DBT_PROFILES }}" > ~/.dbt/profiles.yml

      - name: Run dbt deps
        run: dbt deps

      # 🔥 CI (validação)
      - name: Run dbt debug
        run: dbt debug

      - name: Run dbt tests
        run: dbt test

      # 🚀 CD (deploy)
      - name: Deploy to PROD
        run: dbt run --target prod